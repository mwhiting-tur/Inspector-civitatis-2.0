name: Ejecutar Scraping Semanal

on:
  workflow_dispatch:
  # Ejecutar automáticamente los viernes a las 11:00 UTC 
  # (Que corresponde a las 08:00 AM hora Chile Verano / 07:00 AM Chile Invierno)
  schedule:
    - cron: '0 11 * * 5'

jobs:
  run-scraper:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - country: "Chile"
            currency: "CLP"
          - country: "México"
            currency: "MXN"
          - country: "Perú"
            currency: "PEN"
          - country: "Colombia"
            currency: "COP"
          - country: "Argentina"
            currency: "ARS"
          - country: "Brasil"
            currency: "BRL"
          - country: "Bolivia"
            currency: "USD"
          - country: "Paraguay"
            currency: "USD"
          - country: "Uruguay"
            currency: "USD"   
          - country: "Ecuador"
            currency: "USD"   
          - country: "Panamá"
            currency: "USD"
          - country: "Costa Rica"
            currency: "USD"
          - country: "República Dominicana"
            currency: "USD"
          - country: "Estados Unidos"
            currency: "USD"
          - country: "España"
            currency: "EUR"
          - country: "Italia"
            currency: "EUR"
          - country: "Francia"
            currency: "EUR"
          - country: "Países Bajos"
            currency: "EUR"
          - country: "Reino Unido"
            currency: "EUR"
          - country: "Alemania"
            currency: "EUR"
          - country: "Portugal"
            currency: "EUR"
          - country: "Turquía"
            currency: "EUR"
          - country: "Grecia"
            currency: "EUR"
          - country: "Japón"
            currency: "USD"
          - country: "China"
            currency: "USD"
          - country: "Tailandia"
            currency: "USD"
          - country: "Indonesia"
            currency: "USD"
          - country: "Australia"
            currency: "USD"
          - country: "Nueva Zelanda"
            currency: "USD"

    steps:
      - name: Descargar código del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Instalar Navegador y Dependencias de Sistema
        run: |
          python -m playwright install chromium --with-deps

      - name: Ejecutar el script por país y moneda
        run: python main_semanal.py "${{ matrix.country }}" "${{ matrix.currency }}"

      - name: Subir CSV resultante
        uses: actions/upload-artifact@v4
        with:
          name: precios-${{ matrix.country }}
          path: data/precios_*.csv
          if-no-files-found: warn

  merge-results:
    needs: run-scraper
    # Ejecutamos el job incluso si algún país falla en la matrix (para salvar los que sí funcionaron)
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          pattern: precios-*
          path: all_data
          merge-multiple: true

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Pandas
        run: pip install pandas

      - name: Combinar CSVs
        run: |
          python -c "
          import pandas as pd
          import glob

          files = glob.glob('all_data/*.csv')
          df_list = []
          for f in files:
              try:
                  df_list.append(pd.read_csv(f))
              except Exception as e:
                  print(f'Error leyendo {f}: {e}')
          
          if df_list:
              df_combined = pd.concat(df_list, ignore_index=True)
              df_combined.to_csv('precios_completos.csv', index=False, encoding='utf-8-sig')
              print('✅ Archivos combinados con éxito.')
          "

      - name: Subir artefacto combinado
        uses: actions/upload-artifact@v4
        with:
          name: precios-completos
          path: precios_completos.csv
          if-no-files-found: warn